<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veronica</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">
    <canvas id="friday-canvas"></canvas>
    <div id="center-text">
      <div id="main-text">VERONICA</div>
      <div id="status-text">System Online</div>
    </div>
    <div id="lock-indicator" style="display:none;">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
      </svg>
    </div>
    <div id="context-menu" style="display:none;">
      <div class="menu-item" data-action="toggle-lock">Lock Position</div>
      <div class="menu-separator"></div>
      <div class="menu-item" data-action="state-idle">State: Idle</div>
      <div class="menu-item" data-action="state-listening">State: Listening</div>
      <div class="menu-item" data-action="state-thinking">State: Thinking</div>
      <div class="menu-item" data-action="state-speaking">State: Speaking</div>
      <div class="menu-item" data-action="state-alert">State: Alert</div>
      <div class="menu-separator"></div>
      <div class="menu-item" data-action="quit">Quit Veronica</div>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
